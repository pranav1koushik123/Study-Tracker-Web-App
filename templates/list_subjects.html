{% extends 'base.html' %}
{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/list_subjects.css') }}">
{% endblock %}
{% block content %}
<h2>Manage Subjects</h2>
<a href="{{ url_for('add_categories') }}" class="btn btn-outline-primary mb-3">+Add Subjects</a>
<table class="table table-bordered">
    <thead>
        <tr><th>Name</th><th>Description</th><th>Actions</th></tr>
    </thead>
    <tbody>
        {% for cat in subjects %}
        <tr>
            <td>{{ cat.name }}</td>
            <td>{{ cat.description }}</td>
            <td>
             <a href="{{ url_for('edit_category', id=cat.id) }}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{{ url_for('delete_category', id=cat.id) }}" class="btn btn-sm btn-danger">Delete</a>
            </td> 
        </tr>
        {% endfor %}
    </tbody>
</table>
    <a href="{{ url_for('dashboard') }}" class="btn btn-success mb-3 ">GO BACK</a>
{% endblock %}
