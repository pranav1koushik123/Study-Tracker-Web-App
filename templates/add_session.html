{% extends 'base.html' %}
{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_session.css') }}">
{% endblock %}
{% block content %}

<form method="POST">
    
    <input type="text" name="title" placeholder="Session" class="form-control mb-3" required>
    <input type="number" name="hours" placeholder="Hours studied" class="form-control mb-3" required>
    <input type="date" name="date" placeholder="Date" class="form-control mb-3" required>
    <select name="subjects_id" class="form-control mb-3" required>
        <option value="subjects">Select Subjects</option>
        {% for cat in subjects %}
        <option value="{{ cat.id }}">
            {% if subjects and subjects.category_id == cat.id %}selected {% endif %}
            {{ cat.name }}
        </option>
        {% endfor %}
    </select>
    <button type="submit" class="btn btn-success">Save</button>
</form>
{% endblock %}
